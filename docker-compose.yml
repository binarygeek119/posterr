# Posterr — requires Docker Engine 20.10+ for host.docker.internal (Linux).
# Jellyfin / Emby / Kodi / Plex are reached over HTTP from Posterr settings (no extra container packages).
#
# Volumes:
#   config/  — settings.json and other config (required to keep setup across restarts).
#   config/  — settings.json + cache/ (poster DB, imagecache, mp3cache). Mount the whole config dir.

version: "3.8"

services:
  posterr:
    image: posterr
    container_name: posterr
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      TZ: "Australia/Brisbane"
      NODE_ENV: production
      BASEPATH: ""
      ET: "false"
    volumes:
      - ~/docker/posterr/custom:/usr/src/app/public/custom
      - ~/docker/posterr/config:/usr/src/app/config
    ports:
      - 9876:3000
    restart: unless-stopped
    # Reach Jellyfin/Emby/Kodi/Plex on the Docker host (Linux). Docker Desktop: often works without this.
    extra_hosts:
      - "host.docker.internal:host-gateway"
