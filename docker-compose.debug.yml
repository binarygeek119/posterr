# Debug compose — same host-gateway helper as docker-compose.yml for media servers on the host.

version: "3.8"

services:
  posterr:
    image: posterr
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: development
      TZ: "Australia/Brisbane"
      BASEURL: ""
    ports:
      - 3000:3000
      - 9229:9229
    command: ["node", "--inspect=0.0.0.0:9229", "index.js"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
