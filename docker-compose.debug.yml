# Debug compose — same host-gateway helper as docker-compose.yml for media servers on the host.
# Bind-mount config (cache/, ads/, ads-view/, DBs, settings) like production so data survives rebuilds.

version: "3.8"

services:
  posterr:
    image: posterrx
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: development
      TZ: "Australia/Brisbane"
      BASEURL: ""
    ports:
      - 3000:3000
      - 9229:9229
    volumes:
      - ./docker-data/config:/usr/src/app/config
      - ./docker-data/custom:/usr/src/app/public/custom
    command: ["node", "--inspect=0.0.0.0:9229", "index.js"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
